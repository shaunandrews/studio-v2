{{header}}

<div data-section="contact-form" data-role="form">
<div class="contact-page">
  <h1 class="contact-title">Inquiries</h1>
  <p class="contact-subtitle">For prints, licensing, commissions, or just to say hello.</p>

  <div class="contact-form">
    <div>
      <label class="form-label">Name</label>
      <input type="text" placeholder="Your name" class="form-input">
    </div>

    <div>
      <label class="form-label">Email</label>
      <input type="email" placeholder="you@email.com" class="form-input">
    </div>

    <div>
      <label class="form-label">Project type</label>
      <input type="text" placeholder="Print, editorial, commercial..." class="form-input">
    </div>

    <div>
      <label class="form-label">Details</label>
      <textarea rows="5" placeholder="Tell me about your project..." class="form-textarea"></textarea>
    </div>

    <div>
      <button class="form-submit">Send</button>
    </div>
  </div>
</div>

<style>
.contact-page {
  max-width: var(--content);
  margin: 0 auto;
  padding: 56px 32px;
}

.contact-title {
  font-family: var(--font-heading);
  font-size: 28px;
  color: var(--text);
  margin: 0 0 8px;
  font-weight: 600;
}

.contact-subtitle {
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--muted);
  margin: 0 0 40px;
  line-height: 1.6;
}

.contact-form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.form-label {
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  display: block;
  margin-bottom: 6px;
}

.form-input {
  width: 100%;
  padding: 12px 14px;
  font-family: var(--font-body);
  font-size: 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  box-sizing: border-box;
}

.form-textarea {
  width: 100%;
  padding: 12px 14px;
  font-family: var(--font-body);
  font-size: 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  box-sizing: border-box;
  resize: vertical;
}

.form-submit {
  padding: 12px 28px;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 6px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
</style>
</div>

{{footer}}
