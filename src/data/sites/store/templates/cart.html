{{header}}

<div data-section="cart-content" data-role="cart">
<div class="cart-page">
  <h1 class="cart-title">Your Cart</h1>

  <div class="cart-items">
    <div class="cart-item">
      <div class="cart-item-image">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=200&h=200&fit=crop&q=80" alt="Classic Watch" class="cart-item-img">
      </div>
      <div class="cart-item-info">
        <div class="cart-item-name">Classic Watch</div>
        <div class="cart-item-qty">Qty: 1</div>
      </div>
      <div class="cart-item-price">$89</div>
    </div>

    <div class="cart-item">
      <div class="cart-item-image">
        <img src="https://images.unsplash.com/photo-1544816155-12df9643f363?w=200&h=200&fit=crop&q=80" alt="Canvas Tote" class="cart-item-img">
      </div>
      <div class="cart-item-info">
        <div class="cart-item-name">Canvas Tote</div>
        <div class="cart-item-qty">Qty: 2</div>
      </div>
      <div class="cart-item-price">$76</div>
    </div>
  </div>

  <div class="cart-subtotal">
    <div class="cart-subtotal-label">Subtotal</div>
    <div class="cart-subtotal-value">$165</div>
  </div>

  <p class="cart-notice">Shipping and taxes calculated at checkout.</p>

  <button class="cart-checkout-btn">Checkout</button>

  <div class="cart-continue">
    <a href="/shop" class="cart-continue-link">Continue shopping</a>
  </div>
</div>
<style>
.cart-page {
  max-width: var(--content);
  margin: 0 auto;
  padding: 40px 32px;
}
.cart-title {
  font-family: var(--font-heading);
  font-size: 28px;
  color: var(--text);
  margin: 0 0 32px;
  font-weight: 700;
}
.cart-items {
  border-top: 1px solid var(--border);
}
.cart-item {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 20px 0;
  border-bottom: 1px solid var(--border);
}
.cart-item-image {
  width: 80px;
  height: 80px;
  border-radius: 6px;
  overflow: hidden;
  background: var(--surface);
  flex-shrink: 0;
}
.cart-item-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.cart-item-info {
  flex: 1;
}
.cart-item-name {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.cart-item-qty {
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
}
.cart-item-price {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text);
  font-weight: 600;
}
.cart-subtotal {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24px 0;
  border-bottom: 1px solid var(--border);
}
.cart-subtotal-label {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--muted);
}
.cart-subtotal-value {
  font-family: var(--font-body);
  font-size: 18px;
  color: var(--text);
  font-weight: 700;
}
.cart-notice {
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--muted);
  margin: 16px 0 24px;
}
.cart-checkout-btn {
  width: 100%;
  padding: 14px 24px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 6px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.cart-continue {
  text-align: center;
  margin-top: 16px;
}
.cart-continue-link {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--muted);
  text-decoration: underline;
}
</style>
</div>

{{footer}}
