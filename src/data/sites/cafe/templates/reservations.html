{{header}}

<!-- Split Layout -->
<div style="display: flex; min-height: 700px;">
  <!-- Left: Image -->
  <div style="flex: 1; overflow: hidden;">
    <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800&h=800&fit=crop&q=80" alt="Restaurant interior" style="width: 100%; height: 100%; object-fit: cover;">
  </div>

  <!-- Right: Form -->
  <div style="flex: 1; padding: 40px 32px; display: flex; flex-direction: column; justify-content: center;">
    <h1 style="font-family: var(--font-heading); font-size: 28px; color: var(--text); margin: 0 0 8px; font-weight: 700;">Reserve a Table</h1>
    <p style="font-family: var(--font-body); font-size: 13px; color: var(--muted); margin: 0 0 28px; line-height: 1.5;">Book ahead for brunch or private events.</p>

    <!-- Date -->
    <label style="font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--text); display: block; margin-bottom: 6px;">Date</label>
    <input type="date" style="width: 100%; padding: 10px 12px; font-family: var(--font-body); font-size: 13px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); margin-bottom: 16px; box-sizing: border-box;">

    <!-- Time -->
    <label style="font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--text); display: block; margin-bottom: 6px;">Time</label>
    <input type="time" style="width: 100%; padding: 10px 12px; font-family: var(--font-body); font-size: 13px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); margin-bottom: 16px; box-sizing: border-box;">

    <!-- Party Size -->
    <label style="font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--text); display: block; margin-bottom: 6px;">Party Size</label>
    <input type="number" min="1" max="20" placeholder="2" style="width: 100%; padding: 10px 12px; font-family: var(--font-body); font-size: 13px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); margin-bottom: 16px; box-sizing: border-box;">

    <!-- Name -->
    <label style="font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--text); display: block; margin-bottom: 6px;">Name</label>
    <input type="text" placeholder="Your name" style="width: 100%; padding: 10px 12px; font-family: var(--font-body); font-size: 13px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); margin-bottom: 16px; box-sizing: border-box;">

    <!-- Email -->
    <label style="font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--text); display: block; margin-bottom: 6px;">Email</label>
    <input type="email" placeholder="you@email.com" style="width: 100%; padding: 10px 12px; font-family: var(--font-body); font-size: 13px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); margin-bottom: 16px; box-sizing: border-box;">

    <!-- Special Requests -->
    <label style="font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--text); display: block; margin-bottom: 6px;">Special Requests</label>
    <textarea rows="3" placeholder="Dietary needs, occasion, seating preference..." style="width: 100%; padding: 10px 12px; font-family: var(--font-body); font-size: 13px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); margin-bottom: 20px; box-sizing: border-box; resize: vertical;"></textarea>

    <!-- Submit -->
    <button style="padding: 12px 24px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer;">Request Reservation</button>
  </div>
</div>

{{footer}}
