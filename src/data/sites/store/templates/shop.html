{{header}}

<div style="max-width: var(--wide); margin: 0 auto; padding: 40px 32px;">
  <h1 style="font-family: var(--font-heading); font-size: 28px; color: var(--text); margin: 0 0 24px; font-weight: 700;">All Products</h1>

  <!-- Filter Bar -->
  <div style="display: flex; gap: 12px; margin-bottom: 32px;">
    <span style="font-family: var(--font-body); font-size: 13px; color: var(--bg); background: var(--accent); padding: 6px 16px; border-radius: 20px; cursor: pointer;">All</span>
    <span style="font-family: var(--font-body); font-size: 13px; color: var(--text); background: var(--surface); padding: 6px 16px; border-radius: 20px; cursor: pointer;">Accessories</span>
    <span style="font-family: var(--font-body); font-size: 13px; color: var(--text); background: var(--surface); padding: 6px 16px; border-radius: 20px; cursor: pointer;">Audio</span>
    <span style="font-family: var(--font-body); font-size: 13px; color: var(--text); background: var(--surface); padding: 6px 16px; border-radius: 20px; cursor: pointer;">Bags</span>
  </div>

  <!-- Product Grid -->
  <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
    <div>
      <div style="border-radius: 8px; overflow: hidden; background: var(--surface); margin-bottom: 12px;">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=400&fit=crop&q=80" alt="Classic Watch" style="width: 100%; height: 200px; object-fit: cover; display: block;">
      </div>
      <div style="font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--text);">Classic Watch</div>
      <div style="font-family: var(--font-body); font-size: 13px; color: var(--muted); margin-top: 2px;">$89</div>
    </div>
    <div>
      <div style="border-radius: 8px; overflow: hidden; background: var(--surface); margin-bottom: 12px;">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=400&fit=crop&q=80" alt="Wireless Headphones" style="width: 100%; height: 200px; object-fit: cover; display: block;">
      </div>
      <div style="font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--text);">Wireless Headphones</div>
      <div style="font-family: var(--font-body); font-size: 13px; color: var(--muted); margin-top: 2px;">$65</div>
    </div>
    <div>
      <div style="border-radius: 8px; overflow: hidden; background: var(--surface); margin-bottom: 12px;">
        <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=400&h=400&fit=crop&q=80" alt="Vintage Camera" style="width: 100%; height: 200px; object-fit: cover; display: block;">
      </div>
      <div style="font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--text);">Vintage Camera</div>
      <div style="font-family: var(--font-body); font-size: 13px; color: var(--muted); margin-top: 2px;">$120</div>
    </div>
    <div>
      <div style="border-radius: 8px; overflow: hidden; background: var(--surface); margin-bottom: 12px;">
        <img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400&h=400&fit=crop&q=80" alt="Retro Sunglasses" style="width: 100%; height: 200px; object-fit: cover; display: block;">
      </div>
      <div style="font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--text);">Retro Sunglasses</div>
      <div style="font-family: var(--font-body); font-size: 13px; color: var(--muted); margin-top: 2px;">$45</div>
    </div>
    <div>
      <div style="border-radius: 8px; overflow: hidden; background: var(--surface); margin-bottom: 12px;">
        <img src="https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400&h=400&fit=crop&q=80" alt="Canvas Backpack" style="width: 100%; height: 200px; object-fit: cover; display: block;">
      </div>
      <div style="font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--text);">Canvas Backpack</div>
      <div style="font-family: var(--font-body); font-size: 13px; color: var(--muted); margin-top: 2px;">$55</div>
    </div>
    <div>
      <div style="border-radius: 8px; overflow: hidden; background: var(--surface); margin-bottom: 12px;">
        <img src="https://images.unsplash.com/photo-1544816155-12df9643f363?w=400&h=400&fit=crop&q=80" alt="Canvas Tote" style="width: 100%; height: 200px; object-fit: cover; display: block;">
      </div>
      <div style="font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--text);">Canvas Tote</div>
      <div style="font-family: var(--font-body); font-size: 13px; color: var(--muted); margin-top: 2px;">$38</div>
    </div>
  </div>
</div>

{{footer}}
