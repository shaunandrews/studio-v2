{{header}}

<div style="max-width: var(--content); margin: 0 auto; padding: 48px 32px;">
  <h1 style="font-family: var(--font-heading); font-size: 36px; color: var(--text); margin: 0 0 8px; font-weight: 700; letter-spacing: -0.5px;">Get in Touch</h1>
  <p style="font-family: var(--font-body); font-size: 14px; color: var(--muted); margin: 0 0 36px;">Have a project in mind? We'd love to hear about it.</p>

  <div style="display: flex; flex-direction: column; gap: 16px;">
    <div style="display: flex; gap: 16px;">
      <div style="flex: 1;">
        <label style="font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 6px;">Name</label>
        <input type="text" placeholder="Your name" style="width: 100%; padding: 12px 14px; font-family: var(--font-body); font-size: 13px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); box-sizing: border-box;">
      </div>
      <div style="flex: 1;">
        <label style="font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 6px;">Email</label>
        <input type="email" placeholder="you@company.com" style="width: 100%; padding: 12px 14px; font-family: var(--font-body); font-size: 13px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); box-sizing: border-box;">
      </div>
    </div>

    <div>
      <label style="font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 6px;">Company</label>
      <input type="text" placeholder="Your company" style="width: 100%; padding: 12px 14px; font-family: var(--font-body); font-size: 13px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); box-sizing: border-box;">
    </div>

    <div>
      <label style="font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 6px;">Project Details</label>
      <textarea rows="5" placeholder="Tell us about your project..." style="width: 100%; padding: 12px 14px; font-family: var(--font-body); font-size: 13px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); box-sizing: border-box; resize: vertical;"></textarea>
    </div>

    <div>
      <button style="padding: 12px 28px; background: var(--accent); color: var(--bg); border: none; border-radius: 6px; font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer;">Send Message</button>
    </div>
  </div>
</div>

<!-- Contact Info -->
<div style="background: var(--surface); padding: 40px 32px; margin-top: 24px;">
  <div style="max-width: var(--content); margin: 0 auto; display: flex; gap: 32px;">
    <div style="flex: 1;">
      <div style="font-family: var(--font-body); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 8px;">Email</div>
      <div style="font-family: var(--font-body); font-size: 14px; color: var(--text);">hello@studiomeridian.com</div>
    </div>
    <div style="flex: 1;">
      <div style="font-family: var(--font-body); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 8px;">Phone</div>
      <div style="font-family: var(--font-body); font-size: 14px; color: var(--text);">+1 (212) 555-0147</div>
    </div>
    <div style="flex: 1;">
      <div style="font-family: var(--font-body); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 8px;">Location</div>
      <div style="font-family: var(--font-body); font-size: 14px; color: var(--text);">New York, NY</div>
    </div>
  </div>
</div>

{{footer}}
