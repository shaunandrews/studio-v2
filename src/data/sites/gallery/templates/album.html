{{header}}

<!-- Album -->
<div style="padding: 32px 32px 8px; max-width: var(--wide); margin: 0 auto;">
  <div style="font-size: 12px; color: var(--muted); margin-bottom: 8px; font-family: var(--font-body);"><a href="/portfolio" style="color: var(--muted); text-decoration: none;">Portfolio</a> &nbsp;/</div>
  <h1 style="font-family: var(--font-heading); font-size: 28px; color: var(--text); margin: 0 0 8px; font-weight: 600;">Mountain Light</h1>
  <p style="font-family: var(--font-body); font-size: 14px; color: var(--muted); margin: 0 0 24px; line-height: 1.5;">Alpine landscapes captured at golden hour across the Cascades and Olympics.</p>
</div>

<div style="padding: 0 8px 8px; max-width: var(--wide); margin: 0 auto;">
  <div style="column-count: 3; column-gap: 8px;">
    <div style="margin-bottom: 8px; break-inside: avoid;">
      <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=500&fit=crop&q=80" alt="Mountains" style="width: 100%; display: block; border-radius: 2px;">
    </div>
    <div style="margin-bottom: 8px; break-inside: avoid;">
      <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=400&h=420&fit=crop&q=80" alt="Lake sunset" style="width: 100%; display: block; border-radius: 2px;">
    </div>
    <div style="margin-bottom: 8px; break-inside: avoid;">
      <img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=400&h=320&fit=crop&q=80" alt="Green valley" style="width: 100%; display: block; border-radius: 2px;">
    </div>
    <div style="margin-bottom: 8px; break-inside: avoid;">
      <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400&h=280&fit=crop&q=80" alt="Misty forest" style="width: 100%; display: block; border-radius: 2px;">
    </div>
  </div>
</div>

{{footer}}
