{{header}}

<div data-section="contact-hero" data-role="hero">
<div class="contact-hero">
  <h1 class="contact-hero-title">Talk to Us</h1>
  <p class="contact-hero-subtitle">Questions about enterprise, sales, or partnerships? We'd love to hear from you.</p>
</div>

<style>
.contact-hero {
  padding: 52px 32px 0;
  text-align: center;
  max-width: var(--content);
  margin: 0 auto;
}
.contact-hero-title {
  font-family: var(--font-heading);
  font-size: 36px;
  font-weight: 800;
  color: var(--text);
  margin: 0 0 12px;
  letter-spacing: -0.5px;
}
.contact-hero-subtitle {
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--muted);
  margin: 0;
  line-height: 1.5;
}
</style>
</div>

<div data-section="contact-form" data-role="form">
<div class="contact-form">

  <div class="contact-form-row">
    <div class="contact-form-field">
      <label class="contact-label">Name</label>
      <input type="text" placeholder="Jane Smith" class="contact-input">
    </div>
    <div class="contact-form-field">
      <label class="contact-label">Work email</label>
      <input type="email" placeholder="jane@company.com" class="contact-input">
    </div>
  </div>

  <div class="contact-form-row">
    <div class="contact-form-field">
      <label class="contact-label">Company</label>
      <input type="text" placeholder="Acme Inc." class="contact-input">
    </div>
    <div class="contact-form-field">
      <label class="contact-label">Team size</label>
      <select class="contact-select">
        <option>1-10</option>
        <option>11-50</option>
        <option>51-200</option>
        <option>200+</option>
      </select>
    </div>
  </div>

  <label class="contact-label">Message</label>
  <textarea rows="5" placeholder="Tell us about your project and how we can help..." class="contact-textarea"></textarea>

  <button class="contact-submit">Send message</button>

  <div class="contact-alt">
    Or email us directly at <a href="mailto:hello@launchpad.dev" class="contact-alt-link">hello@launchpad.dev</a>
  </div>
</div>

<style>
.contact-form {
  max-width: 520px;
  margin: 0 auto;
  padding: 40px 32px;
}
.contact-form-row {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
}
.contact-form-field {
  flex: 1;
}
.contact-label {
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  display: block;
  margin-bottom: 6px;
}
.contact-input {
  width: 100%;
  padding: 10px 12px;
  font-family: var(--font-body);
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  box-sizing: border-box;
}
.contact-select {
  width: 100%;
  padding: 10px 12px;
  font-family: var(--font-body);
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  box-sizing: border-box;
  appearance: auto;
}
.contact-textarea {
  width: 100%;
  padding: 10px 12px;
  font-family: var(--font-body);
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  margin-bottom: 24px;
  box-sizing: border-box;
  resize: vertical;
}
.contact-submit {
  width: 100%;
  padding: 12px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.contact-alt {
  text-align: center;
  margin-top: 24px;
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--muted);
}
.contact-alt-link {
  color: var(--accent);
  text-decoration: none;
}
</style>
</div>

{{footer}}
