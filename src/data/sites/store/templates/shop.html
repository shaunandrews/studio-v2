{{header}}

<div data-section="shop-content" data-role="products">
<div class="shop-page">
  <h1 class="shop-title">All Products</h1>

  <div class="filter-bar">
    <span class="filter-pill filter-pill--active">All</span>
    <span class="filter-pill">Accessories</span>
    <span class="filter-pill">Audio</span>
    <span class="filter-pill">Bags</span>
  </div>

  <div class="shop-product-grid">
    <div>
      <div class="product-thumb">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=400&fit=crop&q=80" alt="Classic Watch" class="shop-product-image">
      </div>
      <div class="product-name">Classic Watch</div>
      <div class="product-price">$89</div>
    </div>
    <div>
      <div class="product-thumb">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=400&fit=crop&q=80" alt="Wireless Headphones" class="shop-product-image">
      </div>
      <div class="product-name">Wireless Headphones</div>
      <div class="product-price">$65</div>
    </div>
    <div>
      <div class="product-thumb">
        <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=400&h=400&fit=crop&q=80" alt="Vintage Camera" class="shop-product-image">
      </div>
      <div class="product-name">Vintage Camera</div>
      <div class="product-price">$120</div>
    </div>
    <div>
      <div class="product-thumb">
        <img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400&h=400&fit=crop&q=80" alt="Retro Sunglasses" class="shop-product-image">
      </div>
      <div class="product-name">Retro Sunglasses</div>
      <div class="product-price">$45</div>
    </div>
    <div>
      <div class="product-thumb">
        <img src="https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400&h=400&fit=crop&q=80" alt="Canvas Backpack" class="shop-product-image">
      </div>
      <div class="product-name">Canvas Backpack</div>
      <div class="product-price">$55</div>
    </div>
    <div>
      <div class="product-thumb">
        <img src="https://images.unsplash.com/photo-1544816155-12df9643f363?w=400&h=400&fit=crop&q=80" alt="Canvas Tote" class="shop-product-image">
      </div>
      <div class="product-name">Canvas Tote</div>
      <div class="product-price">$38</div>
    </div>
  </div>
</div>
<style>
.shop-page {
  max-width: var(--wide);
  margin: 0 auto;
  padding: 40px 32px;
}
.shop-title {
  font-family: var(--font-heading);
  font-size: 28px;
  color: var(--text);
  margin: 0 0 24px;
  font-weight: 700;
}
.filter-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 32px;
}
.filter-pill {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text);
  background: var(--surface);
  padding: 6px 16px;
  border-radius: 20px;
  cursor: pointer;
}
.filter-pill--active {
  color: var(--bg);
  background: var(--accent);
}
.shop-product-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.shop-product-image {
  width: 100%;
  height: 200px;
  object-fit: cover;
  display: block;
}
</style>
</div>

{{footer}}
