{{header}}

<div data-section="home-hero-banner" data-role="hero">
<div class="hero-banner">
  <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=800&h=400&fit=crop&q=80" alt="Store" class="hero-image">
  <div class="hero-overlay">
    <h1 class="hero-title">Spring Collection</h1>
    <p class="hero-subtitle">New arrivals &mdash; free shipping over $75</p>
  </div>
</div>
<style>
.hero-banner {
  position: relative;
  height: 360px;
  overflow: hidden;
}
.hero-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.hero-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.hero-title {
  font-family: var(--font-heading);
  font-size: 42px;
  color: #fff;
  margin: 0;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.hero-subtitle {
  font-family: var(--font-body);
  font-size: 15px;
  color: rgba(255,255,255,0.85);
  margin: 12px 0 0;
}
</style>
</div>

<div data-section="home-product-grid" data-role="products">
<div class="home-products">
  <h2 class="home-products-title">New Arrivals</h2>
  <div class="home-product-grid">
    <div>
      <div class="product-thumb">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=400&fit=crop&q=80" alt="Classic Watch" class="product-thumb-image">
      </div>
      <div class="product-name">Classic Watch</div>
      <div class="product-price">$89</div>
    </div>
    <div>
      <div class="product-thumb">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=400&fit=crop&q=80" alt="Wireless Headphones" class="product-thumb-image">
      </div>
      <div class="product-name">Wireless Headphones</div>
      <div class="product-price">$65</div>
    </div>
    <div>
      <div class="product-thumb">
        <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=400&h=400&fit=crop&q=80" alt="Vintage Camera" class="product-thumb-image">
      </div>
      <div class="product-name">Vintage Camera</div>
      <div class="product-price">$120</div>
    </div>
    <div>
      <div class="product-thumb">
        <img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400&h=400&fit=crop&q=80" alt="Retro Sunglasses" class="product-thumb-image">
      </div>
      <div class="product-name">Retro Sunglasses</div>
      <div class="product-price">$45</div>
    </div>
  </div>
</div>
<style>
.home-products {
  padding: 40px 32px;
  max-width: var(--wide);
  margin: 0 auto;
}
.home-products-title {
  font-family: var(--font-heading);
  font-size: 20px;
  color: var(--text);
  margin: 0 0 24px;
  font-weight: 600;
}
.home-product-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}
.product-thumb {
  border-radius: 8px;
  overflow: hidden;
  background: var(--surface);
  margin-bottom: 12px;
}
.product-thumb-image {
  width: 100%;
  height: 180px;
  object-fit: cover;
  display: block;
}
.product-name {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.product-price {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--muted);
  margin-top: 2px;
}
</style>
</div>

<div data-section="home-shipping-info" data-role="shipping">
<div class="shipping-info">
  <div class="shipping-info-inner">
    <div class="shipping-info-item">
      <div class="shipping-info-title">Free Shipping</div>
      <div class="shipping-info-desc">On orders over $75</div>
    </div>
    <div class="shipping-info-item">
      <div class="shipping-info-title">Easy Returns</div>
      <div class="shipping-info-desc">30-day return policy</div>
    </div>
    <div class="shipping-info-item">
      <div class="shipping-info-title">Lifetime Guarantee</div>
      <div class="shipping-info-desc">We stand behind our products</div>
    </div>
  </div>
</div>
<style>
.shipping-info {
  background: var(--surface);
  padding: 32px;
}
.shipping-info-inner {
  max-width: var(--wide);
  margin: 0 auto;
  display: flex;
  gap: 32px;
  text-align: center;
}
.shipping-info-item {
  flex: 1;
}
.shipping-info-title {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}
.shipping-info-desc {
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--muted);
}
</style>
</div>

{{footer}}
