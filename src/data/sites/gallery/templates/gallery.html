{{header}}

<div data-section="gallery-header" data-role="hero">
<div class="portfolio-header">
  <h1 class="portfolio-title">Portfolio</h1>
</div>

<style>
.portfolio-header {
  padding: 32px 32px 8px;
  max-width: var(--wide);
  margin: 0 auto;
}

.portfolio-title {
  font-family: var(--font-heading);
  font-size: 28px;
  color: var(--text);
  margin: 0 0 24px;
  font-weight: 600;
}
</style>
</div>

<div data-section="gallery-grid" data-role="gallery">
<div class="portfolio-grid-wrapper">
  <div class="portfolio-grid">
    <div class="portfolio-item">
      <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=500&fit=crop&q=80" alt="Mountains" class="portfolio-image">
    </div>
    <div class="portfolio-item">
      <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400&h=280&fit=crop&q=80" alt="Misty forest" class="portfolio-image">
    </div>
    <div class="portfolio-item">
      <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=400&h=300&fit=crop&q=80" alt="Forest path" class="portfolio-image">
    </div>
    <div class="portfolio-item">
      <img src="https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=400&h=450&fit=crop&q=80" alt="Waterfall" class="portfolio-image">
    </div>
    <div class="portfolio-item">
      <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=400&h=420&fit=crop&q=80" alt="Lake sunset" class="portfolio-image">
    </div>
    <div class="portfolio-item">
      <img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=400&h=320&fit=crop&q=80" alt="Green valley" class="portfolio-image">
    </div>
  </div>
</div>

<style>
.portfolio-grid-wrapper {
  padding: 0 8px 8px;
  max-width: var(--wide);
  margin: 0 auto;
}

.portfolio-grid {
  column-count: 3;
  column-gap: 8px;
}

.portfolio-item {
  margin-bottom: 8px;
  break-inside: avoid;
}

.portfolio-image {
  width: 100%;
  display: block;
  border-radius: 2px;
}
</style>
</div>

{{footer}}
