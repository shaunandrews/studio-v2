{{header}}

<div style="max-width: 480px; margin: 0 auto; padding: 48px 32px; font-family: var(--font-body);">
  <h1 style="font-family: var(--font-heading); font-size: 32px; color: var(--text); margin: 0 0 8px; font-weight: 700; letter-spacing: -0.5px; text-align: center;">Say Hello</h1>
  <p style="font-size: 14px; color: var(--muted); margin: 0 0 36px; text-align: center;">Have a question or just want to chat? I'd love to hear from you.</p>

  <label style="font-size: 12px; font-weight: 600; color: var(--text); display: block; margin-bottom: 6px;">Name</label>
  <input type="text" placeholder="Your name" style="width: 100%; padding: 10px 12px; font-family: var(--font-body); font-size: 13px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); margin-bottom: 16px; box-sizing: border-box;">

  <label style="font-size: 12px; font-weight: 600; color: var(--text); display: block; margin-bottom: 6px;">Email</label>
  <input type="email" placeholder="you@email.com" style="width: 100%; padding: 10px 12px; font-family: var(--font-body); font-size: 13px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); margin-bottom: 16px; box-sizing: border-box;">

  <label style="font-size: 12px; font-weight: 600; color: var(--text); display: block; margin-bottom: 6px;">Message</label>
  <textarea rows="5" placeholder="What's on your mind?" style="width: 100%; padding: 10px 12px; font-family: var(--font-body); font-size: 13px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); margin-bottom: 20px; box-sizing: border-box; resize: vertical;"></textarea>

  <button style="width: 100%; padding: 12px 24px; background: var(--accent); color: var(--bg); border: none; border-radius: 6px; font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer;">Send</button>
</div>

{{footer}}
