    <div class="work-card-featured-overlay">
      <div>
        <div class="work-card-featured-title">Finova Banking</div>
        <div class="work-card-featured-meta">Branding &middot; Web</div>
      </div>
    </div>
  </div>

  <div class="work-card-row">
    <div class="work-card">
      <img src="https://images.unsplash.com/photo-1545235617-9465d2a55698?w=600&h=400&fit=crop&q=80" alt="Relay Health" class="work-card-image">
      <div class="work-card-overlay">
        <div>
          <div class="work-card-title">Relay Health</div>

        </div>
      </div>

    <div class="work-card">

        <div>

        </div>
      </div>
    </div>

<style>
.work-page {
  max-width: var(--wide);
  margin: 0 auto;
  padding: 48px 32px;
}
.work-title {
  font-family: var(--font-heading);
  font-size: 36px;
  color: var(--text);
  margin: 0 0 8px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.work-subtitle {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--muted);
  margin: 0 0 36px;
}
.work-card-featured {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 20px;
}
.work-card-featured-image {
  width: 100%;
  height: 260px;
  object-fit: cover;
  display: block;
}
.work-card-featured-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%);
  display: flex;
  align-items: flex-end;
  padding: 24px;
}
.work-card-featured-title {
  font-family: var(--font-heading);
  font-size: 22px;
  color: #fff;
  font-weight: 700;
}
.work-card-featured-meta {
  font-family: var(--font-body);
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  margin-top: 6px;
}
.work-card-row {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}
.work-card {
  flex: 1;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
}
.work-card-image {
  width: 100%;
  height: 220px;
  object-fit: cover;
  display: block;
}
.work-card-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%);
  display: flex;
  align-items: flex-end;
  padding: 20px;
}
.work-card-title {
  font-family: var(--font-heading);
  font-size: 18px;
  color: #fff;
  font-weight: 700;
}
.work-card-meta {
  font-family: var(--font-body);
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  margin-top: 4px;
}
</style>

{{footer}}
