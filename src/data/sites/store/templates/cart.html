{{header}}

<div style="max-width: var(--content); margin: 0 auto; padding: 40px 32px;">
  <h1 style="font-family: var(--font-heading); font-size: 28px; color: var(--text); margin: 0 0 32px; font-weight: 700;">Your Cart</h1>

  <!-- Cart Items -->
  <div style="border-top: 1px solid var(--border);">
    <!-- Item 1 -->
    <div style="display: flex; align-items: center; gap: 20px; padding: 20px 0; border-bottom: 1px solid var(--border);">
      <div style="width: 80px; height: 80px; border-radius: 6px; overflow: hidden; background: var(--surface); flex-shrink: 0;">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=200&h=200&fit=crop&q=80" alt="Classic Watch" style="width: 100%; height: 100%; object-fit: cover;">
      </div>
      <div style="flex: 1;">
        <div style="font-family: var(--font-body); font-size: 14px; font-weight: 600; color: var(--text);">Classic Watch</div>
        <div style="font-family: var(--font-body); font-size: 12px; color: var(--muted); margin-top: 4px;">Qty: 1</div>
      </div>
      <div style="font-family: var(--font-body); font-size: 14px; color: var(--text); font-weight: 600;">$89</div>
    </div>

    <!-- Item 2 -->
    <div style="display: flex; align-items: center; gap: 20px; padding: 20px 0; border-bottom: 1px solid var(--border);">
      <div style="width: 80px; height: 80px; border-radius: 6px; overflow: hidden; background: var(--surface); flex-shrink: 0;">
        <img src="https://images.unsplash.com/photo-1544816155-12df9643f363?w=200&h=200&fit=crop&q=80" alt="Canvas Tote" style="width: 100%; height: 100%; object-fit: cover;">
      </div>
      <div style="flex: 1;">
        <div style="font-family: var(--font-body); font-size: 14px; font-weight: 600; color: var(--text);">Canvas Tote</div>
        <div style="font-family: var(--font-body); font-size: 12px; color: var(--muted); margin-top: 4px;">Qty: 2</div>
      </div>
      <div style="font-family: var(--font-body); font-size: 14px; color: var(--text); font-weight: 600;">$76</div>
    </div>
  </div>

  <!-- Subtotal -->
  <div style="display: flex; justify-content: space-between; align-items: center; padding: 24px 0; border-bottom: 1px solid var(--border);">
    <div style="font-family: var(--font-body); font-size: 14px; color: var(--muted);">Subtotal</div>
    <div style="font-family: var(--font-body); font-size: 18px; color: var(--text); font-weight: 700;">$165</div>
  </div>

  <p style="font-family: var(--font-body); font-size: 12px; color: var(--muted); margin: 16px 0 24px;">Shipping and taxes calculated at checkout.</p>

  <button style="width: 100%; padding: 14px 24px; background: var(--accent); color: var(--bg); border: none; border-radius: 6px; font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer;">Checkout</button>

  <div style="text-align: center; margin-top: 16px;">
    <a href="/shop" style="font-family: var(--font-body); font-size: 13px; color: var(--muted); text-decoration: underline;">Continue shopping</a>
  </div>
</div>

{{footer}}
