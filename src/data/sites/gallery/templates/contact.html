{{header}}

<div style="max-width: var(--content); margin: 0 auto; padding: 56px 32px;">
  <h1 style="font-family: var(--font-heading); font-size: 28px; color: var(--text); margin: 0 0 8px; font-weight: 600;">Inquiries</h1>
  <p style="font-family: var(--font-body); font-size: 15px; color: var(--muted); margin: 0 0 40px; line-height: 1.6;">For prints, licensing, commissions, or just to say hello.</p>

  <div style="display: flex; flex-direction: column; gap: 20px;">
    <div>
      <label style="font-family: var(--font-body); font-size: 12px; font-weight: 500; color: var(--muted); display: block; margin-bottom: 6px;">Name</label>
      <input type="text" placeholder="Your name" style="width: 100%; padding: 12px 14px; font-family: var(--font-body); font-size: 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); box-sizing: border-box;">
    </div>

    <div>
      <label style="font-family: var(--font-body); font-size: 12px; font-weight: 500; color: var(--muted); display: block; margin-bottom: 6px;">Email</label>
      <input type="email" placeholder="you@email.com" style="width: 100%; padding: 12px 14px; font-family: var(--font-body); font-size: 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); box-sizing: border-box;">
    </div>

    <div>
      <label style="font-family: var(--font-body); font-size: 12px; font-weight: 500; color: var(--muted); display: block; margin-bottom: 6px;">Project type</label>
      <input type="text" placeholder="Print, editorial, commercial..." style="width: 100%; padding: 12px 14px; font-family: var(--font-body); font-size: 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); box-sizing: border-box;">
    </div>

    <div>
      <label style="font-family: var(--font-body); font-size: 12px; font-weight: 500; color: var(--muted); display: block; margin-bottom: 6px;">Details</label>
      <textarea rows="5" placeholder="Tell me about your project..." style="width: 100%; padding: 12px 14px; font-family: var(--font-body); font-size: 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); box-sizing: border-box; resize: vertical;"></textarea>
    </div>

    <div>
      <button style="padding: 12px 28px; background: var(--text); color: var(--bg); border: none; border-radius: 6px; font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer;">Send</button>
    </div>
  </div>
</div>

{{footer}}
