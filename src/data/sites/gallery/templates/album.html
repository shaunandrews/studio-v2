{{header}}

<div data-section="album-header" data-role="hero">
<div class="album-header">
  <div class="album-breadcrumb"><a href="/portfolio" class="album-breadcrumb-link">Portfolio</a> &nbsp;/</div>
  <h1 class="album-title">Mountain Light</h1>
  <p class="album-description">Alpine landscapes captured at golden hour across the Cascades and Olympics.</p>
</div>

<style>
.album-header {
  padding: 32px 32px 8px;
  max-width: var(--wide);
  margin: 0 auto;
}

.album-breadcrumb {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
  font-family: var(--font-body);
}

.album-breadcrumb-link {
  color: var(--muted);
  text-decoration: none;
}

.album-title {
  font-family: var(--font-heading);
  font-size: 28px;
  color: var(--text);
  margin: 0 0 8px;
  font-weight: 600;
}

.album-description {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--muted);
  margin: 0 0 24px;
  line-height: 1.5;
}
</style>
</div>

<div data-section="album-grid" data-role="gallery">
<div class="album-grid-wrapper">
  <div class="album-grid">
    <div class="album-item">
      <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=500&fit=crop&q=80" alt="Mountains" class="album-image">
    </div>
    <div class="album-item">
      <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=400&h=420&fit=crop&q=80" alt="Lake sunset" class="album-image">
    </div>
    <div class="album-item">
      <img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=400&h=320&fit=crop&q=80" alt="Green valley" class="album-image">
    </div>
    <div class="album-item">
      <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400&h=280&fit=crop&q=80" alt="Misty forest" class="album-image">
    </div>
  </div>
</div>

<style>
.album-grid-wrapper {
  padding: 0 8px 8px;
  max-width: var(--wide);
  margin: 0 auto;
}

.album-grid {
  column-count: 3;
  column-gap: 8px;
}

.album-item {
  margin-bottom: 8px;
  break-inside: avoid;
}

.album-image {
  width: 100%;
  display: block;
  border-radius: 2px;
}
</style>
</div>

{{footer}}
