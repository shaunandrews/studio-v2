{{header}}

<!-- Hero Banner -->
<div style="position: relative; height: 360px; overflow: hidden;">
  <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=800&h=400&fit=crop&q=80" alt="Store" style="width: 100%; height: 100%; object-fit: cover;">
  <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; flex-direction: column;">
    <h1 style="font-family: var(--font-heading); font-size: 42px; color: #fff; margin: 0; font-weight: 700; letter-spacing: -0.5px;">Spring Collection</h1>
    <p style="font-family: var(--font-body); font-size: 15px; color: rgba(255,255,255,0.85); margin: 12px 0 0;">New arrivals &mdash; free shipping over $75</p>
  </div>
</div>

<!-- Product Grid -->
<div style="padding: 40px 32px; max-width: var(--wide); margin: 0 auto;">
  <h2 style="font-family: var(--font-heading); font-size: 20px; color: var(--text); margin: 0 0 24px; font-weight: 600;">New Arrivals</h2>
  <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;">
    <div>
      <div style="border-radius: 8px; overflow: hidden; background: var(--surface); margin-bottom: 12px;">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=400&fit=crop&q=80" alt="Classic Watch" style="width: 100%; height: 180px; object-fit: cover; display: block;">
      </div>
      <div style="font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--text);">Classic Watch</div>
      <div style="font-family: var(--font-body); font-size: 13px; color: var(--muted); margin-top: 2px;">$89</div>
    </div>
    <div>
      <div style="border-radius: 8px; overflow: hidden; background: var(--surface); margin-bottom: 12px;">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=400&fit=crop&q=80" alt="Wireless Headphones" style="width: 100%; height: 180px; object-fit: cover; display: block;">
      </div>
      <div style="font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--text);">Wireless Headphones</div>
      <div style="font-family: var(--font-body); font-size: 13px; color: var(--muted); margin-top: 2px;">$65</div>
    </div>
    <div>
      <div style="border-radius: 8px; overflow: hidden; background: var(--surface); margin-bottom: 12px;">
        <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=400&h=400&fit=crop&q=80" alt="Vintage Camera" style="width: 100%; height: 180px; object-fit: cover; display: block;">
      </div>
      <div style="font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--text);">Vintage Camera</div>
      <div style="font-family: var(--font-body); font-size: 13px; color: var(--muted); margin-top: 2px;">$120</div>
    </div>
    <div>
      <div style="border-radius: 8px; overflow: hidden; background: var(--surface); margin-bottom: 12px;">
        <img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400&h=400&fit=crop&q=80" alt="Retro Sunglasses" style="width: 100%; height: 180px; object-fit: cover; display: block;">
      </div>
      <div style="font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--text);">Retro Sunglasses</div>
      <div style="font-family: var(--font-body); font-size: 13px; color: var(--muted); margin-top: 2px;">$45</div>
    </div>
  </div>
</div>

<!-- Shipping Info -->
<div style="background: var(--surface); padding: 32px;">
  <div style="max-width: var(--wide); margin: 0 auto; display: flex; gap: 32px; text-align: center;">
    <div style="flex: 1;">
      <div style="font-family: var(--font-body); font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px;">Free Shipping</div>
      <div style="font-family: var(--font-body); font-size: 12px; color: var(--muted);">On orders over $75</div>
    </div>
    <div style="flex: 1;">
      <div style="font-family: var(--font-body); font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px;">Easy Returns</div>
      <div style="font-family: var(--font-body); font-size: 12px; color: var(--muted);">30-day return policy</div>
    </div>
    <div style="flex: 1;">
      <div style="font-family: var(--font-body); font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px;">Lifetime Guarantee</div>
      <div style="font-family: var(--font-body); font-size: 12px; color: var(--muted);">We stand behind our products</div>
    </div>
  </div>
</div>

{{footer}}
