{{header}}

<div style="max-width: var(--wide); margin: 0 auto; padding: 48px 32px;">
  <h1 style="font-family: var(--font-heading); font-size: 36px; color: var(--text); margin: 0 0 8px; font-weight: 700; letter-spacing: -0.5px;">Selected Work</h1>
  <p style="font-family: var(--font-body); font-size: 14px; color: var(--muted); margin: 0 0 36px;">A collection of projects we're proud of.</p>

  <!-- Project 1 -->
  <div style="position: relative; border-radius: 8px; overflow: hidden; margin-bottom: 20px;">
    <img src="https://images.unsplash.com/photo-1561070791-2526d30994b5?w=600&h=400&fit=crop&q=80" alt="Finova Banking" style="width: 100%; height: 260px; object-fit: cover; display: block;">
    <div style="position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%); display: flex; align-items: flex-end; padding: 24px;">
      <div>
        <div style="font-family: var(--font-heading); font-size: 22px; color: #fff; font-weight: 700;">Finova Banking</div>
        <div style="font-family: var(--font-body); font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 6px;">Branding &middot; Web</div>
      </div>
    </div>
  </div>

  <!-- Project 2 -->
  <div style="display: flex; gap: 20px; margin-bottom: 20px;">
    <div style="flex: 1; position: relative; border-radius: 8px; overflow: hidden;">
      <img src="https://images.unsplash.com/photo-1545235617-9465d2a55698?w=600&h=400&fit=crop&q=80" alt="Relay Health" style="width: 100%; height: 220px; object-fit: cover; display: block;">
      <div style="position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%); display: flex; align-items: flex-end; padding: 20px;">
        <div>
          <div style="font-family: var(--font-heading); font-size: 18px; color: #fff; font-weight: 700;">Relay Health</div>
          <div style="font-family: var(--font-body); font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 4px;">Product &middot; Design System</div>
        </div>
      </div>
    </div>
    <div style="flex: 1; position: relative; border-radius: 8px; overflow: hidden;">
      <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600&h=400&fit=crop&q=80" alt="Onda Surf Co." style="width: 100%; height: 220px; object-fit: cover; display: block;">
      <div style="position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%); display: flex; align-items: flex-end; padding: 20px;">
        <div>
          <div style="font-family: var(--font-heading); font-size: 18px; color: #fff; font-weight: 700;">Onda Surf Co.</div>
          <div style="font-family: var(--font-body); font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 4px;">E-commerce &middot; Branding</div>
        </div>
      </div>
    </div>
  </div>
</div>

{{footer}}
